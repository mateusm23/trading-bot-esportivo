<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Bot Esportivo</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 1.25rem; font-weight: 700; color: #fff; }
    header span { font-size: 0.85rem; color: #64748b; }

    .dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: #22c55e;
      margin-right: 8px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    main { padding: 28px 32px; max-width: 1200px; margin: 0 auto; }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 20px;
    }
    .card .label { font-size: .78rem; color: #64748b; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
    .card .value { font-size: 1.8rem; font-weight: 700; color: #fff; }
    .card .value.green { color: #22c55e; }
    .card .value.red   { color: #ef4444; }
    .card .value.blue  { color: #60a5fa; }

    section {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 10px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    section h2 {
      font-size: .95rem; font-weight: 600;
      padding: 16px 20px;
      border-bottom: 1px solid #2d3148;
      color: #cbd5e1;
    }

    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    thead th {
      text-align: left; padding: 10px 20px;
      background: #13151f; color: #64748b;
      font-weight: 600; font-size: .78rem;
      text-transform: uppercase; letter-spacing: .4px;
    }
    tbody tr { border-top: 1px solid #1e2235; transition: background .15s; }
    tbody tr:hover { background: #1e2235; }
    tbody td { padding: 12px 20px; color: #cbd5e1; }

    .badge {
      display: inline-block; padding: 2px 10px;
      border-radius: 20px; font-size: .75rem; font-weight: 600;
    }
    .badge.win  { background: #14532d; color: #4ade80; }
    .badge.loss { background: #450a0a; color: #f87171; }
    .badge.pend { background: #1e293b; color: #94a3b8; }

    .score-bar { display: flex; align-items: center; gap: 8px; }
    .score-bar .bar { flex:1; height: 6px; background: #2d3148; border-radius: 3px; overflow: hidden; }
    .score-bar .fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg,#3b82f6,#22c55e); }

    .chart-wrap { padding: 20px; height: 280px; }
    .empty { padding: 40px 20px; text-align: center; color: #475569; font-size: .9rem; }

    .sub { color: #64748b; font-size: .8rem; }
  </style>
</head>
<body>

<header>
  <h1><span class="dot"></span>Trading Bot Esportivo</h1>
  <span id="data-hora">--</span>
</header>

<main>

  <div class="cards">
    <div class="card">
      <div class="label">Jogos hoje</div>
      <div class="value blue" id="card-jogos">--</div>
    </div>
    <div class="card">
      <div class="label">Aprovados</div>
      <div class="value" id="card-aprovados">--</div>
    </div>
    <div class="card">
      <div class="label">Taxa historica</div>
      <div class="value green" id="card-taxa">--</div>
    </div>
    <div class="card">
      <div class="label">Acertos total</div>
      <div class="value green" id="card-acertos">--</div>
    </div>
    <div class="card">
      <div class="label">Erros total</div>
      <div class="value red" id="card-erros">--</div>
    </div>
    <div class="card">
      <div class="label">Pendentes</div>
      <div class="value" id="card-pend">--</div>
    </div>
  </div>

  <section>
    <h2>Selecoes de Hoje</h2>
    <div id="tabela-hoje"></div>
  </section>

  <section>
    <h2>Taxa de Acerto por Dia</h2>
    <div class="chart-wrap"><canvas id="grafico"></canvas></div>
  </section>

  <section>
    <h2>Historico Recente</h2>
    <div id="tabela-historico"></div>
  </section>

</main>

<script>
  function tick() {
    const n = new Date();
    document.getElementById('data-hora').textContent =
      n.toLocaleDateString('pt-BR') + '  ' +
      n.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
  }
  tick(); setInterval(tick, 10000);

  function badge(v) {
    if (v === true  || v === 'True')  return '<span class="badge win">ACERTO</span>';
    if (v === false || v === 'False') return '<span class="badge loss">ERRO</span>';
    return '<span class="badge pend">PENDENTE</span>';
  }

  function scoreBar(sc) {
    const pct = Math.min(100, Math.max(0, sc || 0));
    return `<div class="score-bar">
      <span>${sc || '--'}</span>
      <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
    </div>`;
  }

  // Selecoes de hoje
  fetch('/api/selecoes_hoje')
    .then(r => r.json())
    .then(data => {
      document.getElementById('card-jogos').textContent = data.total_jogos ?? '--';
      const sel = data.selecoes || [];
      document.getElementById('card-aprovados').textContent = sel.length;

      const el = document.getElementById('tabela-hoje');
      if (!sel.length) {
        el.innerHTML = '<div class="empty">Nenhuma selecao aprovada hoje.</div>';
        return;
      }
      const rows = sel.map(s => {
        const hora = s.start_time
          ? new Date(s.start_time).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})
          : '--';
        const forma = s.form_vitorias !== undefined ? s.form_vitorias + '/5 vitorias' : (s.motivo || '--');
        return `<tr>
          <td>${hora}</td>
          <td><strong>${s.event}</strong><br><span class="sub">${s.competition}</span></td>
          <td>${s.favorito}<br><strong>${s.odd_favorito}</strong></td>
          <td>${scoreBar(s.score)}</td>
          <td><span class="sub">${forma}</span></td>
          <td>${s.num_bookmakers} casas</td>
        </tr>`;
      }).join('');
      el.innerHTML = `<table>
        <thead><tr>
          <th>Hora</th><th>Jogo</th><th>Favorito / Odd</th>
          <th>Score</th><th>Forma</th><th>Liquidez</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    })
    .catch(() => {
      document.getElementById('tabela-hoje').innerHTML = '<div class="empty">Erro ao carregar selecoes.</div>';
    });

  // Historico + grafico
  fetch('/api/historico')
    .then(r => r.json())
    .then(rows => {
      const acertos = rows.filter(r => r.favorito_ganhou === 'True').length;
      const erros   = rows.filter(r => r.favorito_ganhou === 'False').length;
      const pend    = rows.length - acertos - erros;
      const taxa    = (acertos + erros) > 0 ? Math.round(acertos / (acertos + erros) * 100) : null;

      document.getElementById('card-taxa').textContent    = taxa !== null ? taxa + '%' : '--';
      document.getElementById('card-acertos').textContent = acertos;
      document.getElementById('card-erros').textContent   = erros;
      document.getElementById('card-pend').textContent    = pend;

      // Tabela
      const recentes = rows.slice(-30).reverse();
      const el = document.getElementById('tabela-historico');
      if (!recentes.length) {
        el.innerHTML = '<div class="empty">Nenhum historico disponivel ainda.</div>';
      } else {
        const rh = recentes.map(r => `<tr>
          <td>${r.data}</td>
          <td>${r.event}</td>
          <td>${r.competition}</td>
          <td>${r.favorito}<br><strong>${r.odd_favorito}</strong></td>
          <td>${r.score || '--'}</td>
          <td>${r.resultado_real}</td>
          <td>${badge(r.favorito_ganhou)}</td>
        </tr>`).join('');
        el.innerHTML = `<table>
          <thead><tr>
            <th>Data</th><th>Jogo</th><th>Liga</th><th>Favorito / Odd</th>
            <th>Score</th><th>Resultado</th><th>Status</th>
          </tr></thead>
          <tbody>${rh}</tbody>
        </table>`;
      }

      // Grafico taxa por dia
      const porDia = {};
      for (const r of rows) {
        if (!porDia[r.data]) porDia[r.data] = {a:0, e:0};
        if (r.favorito_ganhou === 'True')  porDia[r.data].a++;
        if (r.favorito_ganhou === 'False') porDia[r.data].e++;
      }
      const dias  = Object.keys(porDia).sort();
      const taxas = dias.map(d => {
        const {a, e} = porDia[d];
        return (a+e) > 0 ? Math.round(a/(a+e)*100) : null;
      });

      new Chart(document.getElementById('grafico').getContext('2d'), {
        type: 'line',
        data: {
          labels: dias,
          datasets: [{
            label: 'Taxa de acerto (%)',
            data: taxas,
            borderColor: '#3b82f6',
            backgroundColor: 'rgba(59,130,246,0.08)',
            tension: 0.35, fill: true,
            pointBackgroundColor: taxas.map(t => t >= 60 ? '#22c55e' : t >= 50 ? '#f59e0b' : '#ef4444'),
            pointRadius: 5,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: {
            y: { min:0, max:100, ticks:{color:'#64748b', callback: v => v+'%'}, grid:{color:'#1e2235'} },
            x: { ticks:{color:'#64748b'}, grid:{color:'#1e2235'} }
          },
          plugins: {
            legend: { labels:{color:'#94a3b8'} },
            tooltip: { callbacks: { label: c => c.parsed.y+'%' } }
          }
        }
      });
    })
    .catch(() => {
      document.getElementById('tabela-historico').innerHTML = '<div class="empty">Erro ao carregar historico.</div>';
    });
</script>
</body>
</html>

name: Trading Bot

on:
  workflow_dispatch:        # botão manual na aba Actions
  schedule:
    - cron: '0 11 * * *'   # automático todo dia 08h BRT (11h UTC)

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # roda por até 6 horas e para sozinho

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Criar .env com as secrets
        run: |
          cat > .env << 'EOF'
          ODDS_API_KEY=${{ secrets.ODDS_API_KEY }}
          API_FOOTBALL_KEY=${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_KEY=${{ secrets.FOOTBALL_DATA_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          BANCA_INICIAL=${{ secrets.BANCA_INICIAL }}
          STAKE_PERCENT=2.5
          STOP_DIARIO_PERCENT=5.0
          EOF

      - name: Criar pastas necessárias
        run: mkdir -p logs data

      - name: Rodar bot
        run: python main.py
